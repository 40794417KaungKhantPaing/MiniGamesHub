<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Game - Menu</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/memory.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <audio id="bgm" src="../assets/sound/background.mp3" autoplay loop hidden></audio>

  <!-- Header / Navigation -->
  <header>
    <nav class="navbar" aria-label="Main navigation">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> Mini Games Hub
      </a>

      <div class="nav-buttons" id="navMenu">
        <a href="../index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i><span>About</span></a>

        <button id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i><span>Theme</span>
        </button>

        <button id="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
          <i class="fa-solid fa-volume-high"></i><span>Sound</span>
        </button>
      </div>

      <button class="burger" id="burgerBtn" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </nav>
  </header>

  <!-- Main Menu Content -->
  <main>
    <section id="menu-screen" class="start-screen" aria-label="Memory Game Menu">
      <a href="how-to.html?game=memory" class="how-to-corner" aria-label="How to play Memory Game">
        <i class="fa-solid fa-circle-question"></i>
      </a>
      <h1><i class="fa-solid fa-brain icon-brain"></i> Memory Game</h1>
      <p>Select your theme to begin:</p>

      <form id="categoryForm">


        <div class="category-grid">
          <input type="radio" name="category" value="fruit" id="fruit" hidden checked>
          <label for="fruit" class="cat-option"><i class="fa-solid fa-apple-whole"></i> Fruits</label>

          <input type="radio" name="category" value="geometry" id="geometry" hidden>
          <label for="geometry" class="cat-option"><i class="fa-solid fa-shapes"></i> Geometry</label>
        </div>

        <p id="categoryHintMenu">Selected Category: <b>Fruits</b></p>

        <button type="submit" class="rst-but"><i class="fa-solid fa-play"></i> Start Game</button>
      </form>
      <div class="game-history">
        <input type="checkbox" id="historyToggle" hidden>
        <label for="historyToggle" class="history-header">
          <h2>Last 5 Games</h2>
          <span class="arrow">&#9660;</span>
        </label>
        <ul id="memoryHistoryList" class="history-list"></ul>
      </div>
    </section>


  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="settings.html">Settings</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="footer-socials" aria-label="Social links">
        <a href="https://x.com" target="_blank" title="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://facebook.com" target="_blank" title="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://instagram.com" target="_blank" title="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>

      <p>
        <i class="fa-regular fa-copyright"></i>
        <span id="currentYear"></span> Mini Games Hub. All rights reserved.
      </p>
    </div>
  </footer>

  <script src="../js/theme.js"></script>
  <script src="../js/memory.js"></script>
</body>

</html>
