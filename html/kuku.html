<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuku Kube - Menu</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/kuku.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <audio id="bgm" src="../assets/sound/background.mp3" autoplay loop hidden></audio>
  <!-- Header / Navigation -->
  <header>
    <nav class="navbar" aria-label="Main navigation">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> Mini Games Hub
      </a>

      <div class="nav-buttons" id="navMenu">
        <a href="../index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i><span>About</span></a>

        <button id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i><span>Theme</span>
        </button>

        <button id="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
          <i class="fa-solid fa-volume-high"></i><span>Sound</span>
        </button>
      </div>

      <button class="burger" id="burgerBtn" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </nav>
  </header>

  <!-- Main Menu Content -->
  <main>
    <section class="start-screen">
      <a href="how-to.html?game=kuku" class="how-to-corner" aria-label="How to play Kuku Kube">
        <i class="fa-solid fa-circle-question"></i>
      </a>
      <h1 class="game-h1">
        <i class="fa-solid fa-border-all icon-grid"></i> Kuku Kube
      </h1>

      <form id="kukuForm">
        <p>Select Difficulty:</p>

        <div class="kuku-difficulty">

          <input type="radio" name="difficulty" value="easy" id="kukuEasy" hidden checked>
          <label for="kukuEasy" class="kuku-diff-btn easy">
            Easy
          </label>

          <input type="radio" name="difficulty" value="medium" id="kukuMedium" hidden>
          <label for="kukuMedium" class="kuku-diff-btn medium">
            Medium
          </label>

          <input type="radio" name="difficulty" value="hard" id="kukuHard" hidden>
          <label for="kukuHard" class="kuku-diff-btn hard">
            Hard
          </label>

        </div>

        <p id="kukuHint">Difficulty: <b>Easy</b></p>

        <button type="submit" class="rst-but">
          <i class="fa-solid fa-play"></i> Start Game
        </button>
      </form>

      <div class="game-history">
        <input type="checkbox" id="historyToggle" hidden>
        <label for="historyToggle" class="history-header">
          <h2>Last 5 Games</h2>
          <span class="arrow">&#9660;</span>
        </label>
        <ul id="kukuHistoryList" class="history-list"></ul>
      </div>

    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">

      <nav class="footer-links" aria-label="Footer navigation">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="settings.html">Settings</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="footer-socials" aria-label="Social links">
        <a href="https://x.com" target="_blank" title="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://facebook.com" target="_blank" title="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://instagram.com" target="_blank" title="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>

      <p><i class="fa-regular fa-copyright"></i> <span id="currentYear"></span> Mini Games Hub. All rights reserved.</p>

    </div>
  </footer>

  <script src="../js/theme.js"></script>
  <script src="../js/kuku.js"></script>

</body>

</html>
