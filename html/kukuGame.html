<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuku Kube</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/kuku.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <audio id="bgm" src="../assets/sound/background.mp3" autoplay loop hidden></audio>
  <audio id="gameOverSound" src="../assets/sound/kukugameover.mp3" preload="auto"></audio>
  <audio id="clickSound" src="../assets/sound/kukuclick.mp3" preload="auto"></audio>
  <!-- Header / Navigation -->
  <header>
    <nav class="navbar" aria-label="Main navigation">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> Mini Games Hub
      </a>

      <div class="nav-buttons" id="navMenu">
        <a href="../index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i><span>About</span></a>

        <button id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i><span>Theme</span>
        </button>

        <button id="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
          <i class="fa-solid fa-volume-high"></i><span>Sound</span>
        </button>
      </div>

      <button class="burger" id="burgerBtn" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </nav>
  </header>

  <!-- Main Game Area -->
  <main>
    <section class="game-card" aria-label="Kuku Kube Game">
      <h1 class="game-h1">
        <i class="fa-solid fa-border-all icon-grid"></i> Kuku Kube
      </h1>

      <p id="score" aria-live="polite">Score: 0</p>

      <div class="best-row">
        <p id="bestScore" aria-live="polite">Best Score: 0 | Last Score: 0</p>
        <button onclick="reset()" class="rst-but small">Restart</button>
        <button onclick="goToMenu()" class="rst-but small">
          <i class="fa-solid fa-arrow-left"></i> Menu
        </button>
      </div>

      <!-- Time bar -->
      <div class="time-container" aria-label="Time remaining">
        <div id="timeBar" class="time-bar"></div>
      </div>

      <!-- Kuku Kube Board -->
      <section id="kukuBoard" class="kuku-board" role="grid" aria-label="Kuku Kube Board">

      </section>
    </section>

    <div id="resultModal" class="modal">
      <div class="modal-content">

        <div class="modal-icons">
          <i class="fa-solid fa-border-all icon-grid"></i>
        </div>

        <h2 id="resultText" style="color: red;">Game Over</h2>
        <p id="resultStats">Score: 0</p>

        <div class="modal-buttons">
          <button class="modal-btn" onclick="reset()">Restart</button>
          <button class="modal-btn" onclick="goToMenu()">Menu</button>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="settings.html">Settings</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="footer-socials" aria-label="Social links">
        <a href="https://x.com" target="_blank" title="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://facebook.com" target="_blank" title="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://instagram.com" target="_blank" title="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>

      <p>
        <i class="fa-regular fa-copyright"></i>
        <span id="currentYear"></span> Mini Games Hub. All rights reserved.
      </p>
    </div>
  </footer>

  <script src="../js/theme.js"></script>
  <script src="../js/kuku.js"></script>
</body>

</html>
