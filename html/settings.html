<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Settings | Mini Games Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <audio id="bgm" src="../assets/sound/background.mp3" loop hidden></audio>

  <!-- Header / Navigation -->
  <header>
    <nav class="navbar" aria-label="Main navigation">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> Mini Games Hub
      </a>

      <div class="nav-buttons" id="navMenu">
        <a href="../index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i><span>About</span></a>
        <a href="stats.html"><i class="fa-solid fa-chart-bar"></i><span>Stats</span></a>

        <button class="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i><span>Theme</span>
        </button>

        <button class="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
          <i class="fa-solid fa-volume-high"></i><span>Sound</span>
        </button>
      </div>

      <button class="burger" id="burgerBtn" aria-label="Open menu">
        <i class="fa-solid fa-bars"></i>
      </button>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="page-wrapper">
    <section class="card game-card" aria-label="Settings Panel">

      <h1><i class="fa-solid fa-gear"></i> Settings</h1>

      <section class="menu" aria-label="Settings Options">

        <button class="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
          <i class="fa-solid fa-moon"></i> <span>Theme</span>
        </button>

        <button class="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
          <i class="fa-solid fa-volume-high"></i> Sound
        </button>

        <!-- Volume Control -->
        <section class="volume-control" aria-label="Music volume control">
          <label for="volumeSlider">
            <i class="fa-solid fa-volume-high"></i> Music Volume
          </label>

          <input type="range" id="volumeSlider" min="0" max="1" step="0.01">
        </section>

        <!-- Stats Link -->
        <a href="stats.html" aria-label="Statistics">
          <i class="fa-solid fa-chart-line"></i> View Game Stats
        </a>

        <!-- Reset -->
        <button onclick="resetSettings()" style="background:#ef4444;color:white;" aria-label="Reset all settings">
          <i class="fa-solid fa-rotate-left"></i> Reset All Settings
        </button>

        <!-- Back -->
        <a href="../index.html" aria-label="Back navigation">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>


      </section>

    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">

      <nav class="footer-links" aria-label="Footer navigation">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="settings.html">Settings</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="footer-socials" aria-label="Social links">
        <a href="https://x.com" target="_blank" title="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="https://facebook.com" target="_blank" title="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="https://instagram.com" target="_blank" title="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>

      <p><i class="fa-regular fa-copyright"></i> <span id="currentYear"></span> Mini Games Hub. All rights reserved.</p>

    </div>
  </footer>

  <script src="../js/theme.js"></script>

</body>

</html>
