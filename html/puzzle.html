<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle - Menu</title>
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/puzzle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <audio id="bgm" src="/assets/sound/background.mp3" autoplay loop hidden></audio>

    <!-- Header / Navigation -->
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-gamepad"></i> Mini Games Hub
            </a>

            <div class="nav-buttons" id="navMenu">
                <a href="../index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
                <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
                <a href="about.html"><i class="fa-solid fa-circle-info"></i><span>About</span></a>

                <button id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme">
                    <i class="fa-solid fa-moon"></i><span>Theme</span>
                </button>

                <button id="muteBtn" onclick="toggleBgm()" aria-label="Toggle sound">
                    <i class="fa-solid fa-volume-high"></i><span>Sound</span>
                </button>
            </div>

            <button class="burger" id="burgerBtn" aria-label="Open menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </nav>
    </header>

    <!-- Main Menu Content -->
    <main>
        <section class="start-screen" aria-label="Sliding Puzzle Menu">
            <a href="how-to.html?game=puzzle" class="how-to-corner" aria-label="How to play Sliding Puzzle">
                <i class="fa-solid fa-circle-question"></i>
            </a>
            <h1>
                <i class="fa-solid fa-puzzle-piece icon-puzzle"></i> Sliding Puzzle
            </h1>
            <!-- Grid Selection -->
            <form id="puzzleForm">
                <p>Select Grid Size:</p>

                <div class="puzzle-grid-select">

                    <input type="radio" name="grid" value="3" id="grid3" hidden checked>
                    <label for="grid3" class="puzzle-grid-btn g3">3 x 3</label>

                    <input type="radio" name="grid" value="4" id="grid4" hidden>
                    <label for="grid4" class="puzzle-grid-btn g4">4 x 4</label>

                    <input type="radio" name="grid" value="5" id="grid5" hidden>
                    <label for="grid5" class="puzzle-grid-btn g5">5 x 5</label>


                </div>

                <p id="gridHint">Grid: <b>3 x 3</b></p>

                <button type="submit" class="rst-but">
                    <i class="fa-solid fa-play"></i> Start Game
                </button>
            </form>
            <div class="game-history">
                <input type="checkbox" id="historyToggle" hidden>
                <label for="historyToggle" class="history-header">
                    <h2>Last 5 Games</h2>
                    <span class="arrow">&#9660;</span>
                </label>
                <ul id="puzzleHistoryList" class="history-list"></ul>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <nav class="footer-links" aria-label="Footer navigation">
                <a href="../index.html">Home</a>
                <a href="about.html">About</a>
                <a href="settings.html">Settings</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="footer-socials" aria-label="Social links">
                <a href="https://x.com" target="_blank" title="Twitter">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
                <a href="https://facebook.com" target="_blank" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="https://instagram.com" target="_blank" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </div>

            <p>
                <i class="fa-regular fa-copyright"></i>
                <span id="currentYear"></span> Mini Games Hub. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="/js/theme.js"></script>
    <script src="/js/puzzle.js"></script>
</body>

</html>
